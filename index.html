<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Sky Fighter</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(#07162e,#123b6d);
  font-family:Arial;
  color:white;
}
#game{
  width:100vw;
  height:100vh;
  position:relative;
  cursor:none;
}
#plane{
  position:absolute;
  bottom:30px;
  left:50%;
  font-size:70px;
  transform:translateX(-50%);
}
.enemy{
  position:absolute;
  font-size:55px;
}
.bullet{
  position:absolute;
  width:8px;
  height:25px;
  background:#00eaff;
  border-radius:10px;
  box-shadow:0 0 15px #00eaff;
}
#score{
  position:absolute;
  top:20px;
  left:20px;
  font-size:30px;
}
#msg{
  position:absolute;
  top:20px;
  right:20px;
  font-size:22px;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="msg">حرك الماوس واضغط لإطلاق النار</div>
  <div id="plane">✈️</div>
</div>

<script>
let game = document.getElementById("game");
let plane = document.getElementById("plane");
let scoreBox = document.getElementById("score");

let score = 0;
let mouseX = window.innerWidth / 2;

document.addEventListener("mousemove", function(e){
  mouseX = e.clientX;
  plane.style.left = mouseX + "px";
});

document.addEventListener("click", shoot);

function shoot(){
  let bullet = document.createElement("div");
  bullet.className = "bullet";

  bullet.style.left = (mouseX - 4) + "px";
  bullet.style.top = (window.innerHeight - 120) + "px";

  game.appendChild(bullet);

  let moveBullet = setInterval(function(){
    let top = parseInt(bullet.style.top);
    bullet.style.top = (top - 15) + "px";

    document.querySelectorAll(".enemy").forEach(function(enemy){
      if(hit(bullet, enemy)){
        score++;
        scoreBox.innerHTML = "Score: " + score;

        enemy.innerHTML = "💥";
        setTimeout(function(){
          enemy.remove();
        },150);

        bullet.remove();
        clearInterval(moveBullet);
      }
    });

    if(top < -30){
      bullet.remove();
      clearInterval(moveBullet);
    }
  },20);
}

function createEnemy(){
  let enemy = document.createElement("div");
  enemy.className = "enemy";
  enemy.innerHTML = Math.random() > 0.5 ? "🛸" : "🚁";

  enemy.style.left = Math.random() * (window.innerWidth - 60) + "px";
  enemy.style.top = "-70px";

  game.appendChild(enemy);

  let moveEnemy = setInterval(function(){
    let top = parseInt(enemy.style.top);
    enemy.style.top = (top + 3) + "px";

    if(hit(enemy, plane)){
      alert("Game Over! Score: " + score);
      location.reload();
    }

    if(top > window.innerHeight){
      enemy.remove();
      clearInterval(moveEnemy);
    }
  },25);
}

function hit(a,b){
  let r1 = a.getBoundingClientRect();
  let r2 = b.getBoundingClientRect();

  return !(
    r1.bottom < r2.top ||
    r1.top > r2.bottom ||
    r1.right < r2.left ||
    r1.left > r2.right
  );
}

setInterval(createEnemy,900);
</script>

</body>
</html>
